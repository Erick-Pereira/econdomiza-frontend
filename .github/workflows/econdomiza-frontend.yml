# Workflow para repositório cuja raiz é o econdomiza-frontend.
#
# Secrets (para publicar a imagem):
#   DOCKER_USERNAME — utilizador ou organização no Docker Hub (ou registry compatível)
#   DOCKER_PASSWORD — token / palavra-passe do registry
#
# Opcional (build-time do Vite):
#   VITE_SIMCAG_GATEWAY_URL — variável ou secret com a URL base da API em produção

name: econdomiza-frontend

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: econdomiza-frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  docker-build-and-push:
    if: github.event_name != 'pull_request'
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/econdomiza-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/econdomiza-frontend:${{ github.sha }}
          build-args: |
            VITE_SIMCAG_GATEWAY_URL=${{ secrets.VITE_SIMCAG_GATEWAY_URL }}
